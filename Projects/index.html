<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="icon" type="image/png" href="Weather.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card" id="result">
        <div class="search">
            <input type="text" id="city" placeholder="Search">
            <button id="btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
        <img src="Weather.png" alt="">
        <h3 id="temp">22°C</h3>
        <h2 id="city-name">New York</h2>
        
        <p id="weather">Partly Cloudy</p>

        <div id="details">

    <div class="info">
        <i class="fa-solid fa-droplet"></i>
        <h3 id="humidity">32%</h3>
        <p>Humidity</p>
    </div>

    <div class="info">
        <i class="fa-solid fa-wind"></i>
        <h3 id="wind">16.9 km/h</h3>
        <p>Wind Speed</p>
    </div>

</div>

    </div>
</body>
<script src="script.js"></script>
</html>
